# MQTT demo 配置模板
# 启动方式：
#   ./mqtt_gateway_demo --config ./mqtt_gateway_demo.ini
#
# 说明：
# 1. 配置文件中的值会先加载，后面命令行再传同名参数时，会覆盖这里的值。
# 2. 布尔值支持多种写法：1/0、true/false、yes/no、on/off。
# 3. 路径参数一般支持两种配置方法：相对路径 或 绝对路径。
# 4. 留空字符串时，表示使用默认值、自动探测，或关闭该可选项，具体看每个参数注释。

[mqtt]
# MQTT Broker 地址。
# 作用：指定要连接的 MQTT 服务器。
# 配置方法：
#   1. 普通 TCP：tcp://IP:端口
#   2. TLS/SSL：ssl://IP:端口
broker=tcp://127.0.0.1:1883
# MQTT 客户端 ID。
# 作用：作为 MQTT 会话标识，同一个 Broker 中建议保持唯一。
# 配置方法：
#   1. 固定写死，例如 gw001
#   2. 用设备唯一编号，例如 SN、CPU 序列号
device_id=
# MQTT 用户名。
# 作用：Broker 开启账号认证时使用。
# 配置方法：
#   1. 留空，表示不使用用户名
#   2. 填真实用户名
username=
# MQTT 密码。
# 作用：配合 username 做认证。
# 配置方法：
#   1. 留空，表示不使用密码
#   2. 填真实密码
password=
# MQTT 保活时间，单位秒。
# 作用：客户端周期性和 Broker 保持连接，避免被判定离线。
# 配置方法：
#   1. 写整数秒，例如 30
#   2. 弱网场景可适当调大，局域网可保持默认
keepalive_s=30
# 是否启用 clean session。
# 作用：控制 MQTT 是否保留上次会话状态。
# 配置方法：
#   1. 1 / true：每次重连都重新建会话
#   2. 0 / false：尽量复用旧会话
clean_session=1
# 控制文件路径。
# 作用：收到 config/down 后，会把 Modbus 相关控制参数保存到这个文件。
# 配置方法：
#   1. 绝对路径，例如 /tmp/modbus_framer_ctrl.json
#   2. 相对路径，例如 ./ctrl/modbus_ctrl.json
ctrl_file=/tmp/modbus_framer_ctrl.json
# 是否强制启用 SSL/TLS。
# 作用：显式开启 TLS 连接。
# 配置方法：
#   1. 0 / false：不强制，按 broker 地址判断
#   2. 1 / true：启用 SSL/TLS
# 一般如果 broker 用 ssl://，这里也建议设为 1。
ssl_enable=0
# 是否跳过服务器证书校验。
# 作用：测试环境自签名证书时可临时使用。
# 配置方法：
#   1. 0 / false：严格校验证书，生产环境推荐
#   2. 1 / true：跳过校验，仅建议测试用
ssl_insecure=0
# CA 证书文件路径。
# 作用：校验服务器证书。
# 配置方法：
#   1. 留空，表示不额外指定
#   2. 填 CA 文件路径，例如 /userdata/certs/ca.crt
cafile=
# 客户端证书文件路径。
# 作用：双向 TLS 认证时使用。
# 配置方法：
#   1. 留空，不使用客户端证书
#   2. 填证书文件路径
certfile=
# 客户端私钥文件路径。
# 作用：与 certfile 配套，用于双向 TLS 认证。
# 配置方法：
#   1. 留空，不使用私钥
#   2. 填私钥文件路径
keyfile=

[tailer]
# 是否启用文件采集上报线程。
# 作用：从目录中读取数据文件并发布到 MQTT。
# 配置方法：
#   1. 1 / true：开启
#   2. 0 / false：关闭
enable=1
# 数据目录。
# 作用：监听并读取这个目录中的采集文件。
# 配置方法：
#   1. 绝对路径，例如 /userdata/modbus_data
#   2. 相对路径，例如 ./data
data_dir=/userdata/modbus_data
# 文件扩展名过滤。
# 作用：只处理指定扩展名的文件。
# 配置方法：
#   1. 留空：按程序内置规则自动识别
#   2. 填扩展名，例如 .jsonl、.json、.txt
data_ext=
# 文件内容格式。
# 作用：决定 tailer 如何理解文件内容并封装上报。
# 配置方法：
#   1. auto：自动判断
#   2. text：纯文本
#   3. json：JSON / JSONL
#   4. xml：XML
format=auto
# 轮询间隔，单位毫秒。
# 作用：多久扫描一次数据目录。
# 配置方法：
#   1. 写整数毫秒，例如 200
#   2. 数据量小可适当调大，实时性要求高可适当调小
poll_ms=200
# 空闲等待时间，单位毫秒。
# 作用：当目录没有新数据时，tailer 进入更长的空闲等待。
# 配置方法：
#   1. 写整数毫秒，例如 3000
#   2. 频繁产生日志时可调小，低功耗场景可调大
idle_ms=3000

[telemetry]
# 是否启用系统遥测上报。
# 作用：上报 CPU、内存、磁盘、网络状态等系统信息。
# 配置方法：
#   1. 1 / true：开启
#   2. 0 / false：关闭
enable=1
# 遥测上报周期，单位毫秒。
# 作用：控制系统状态消息发送频率。
# 配置方法：
#   1. 写整数毫秒，例如 5000
#   2. 监控要求高可调小，带宽敏感可调大
interval_ms=5000
# 磁盘统计路径。
# 作用：统计该挂载点的磁盘使用率。
# 配置方法：
#   1. 根分区，例如 /
#   2. 业务数据盘，例如 /userdata
disk_path=/
# 温度文件路径。
# 作用：读取板卡温度。
# 配置方法：
#   1. 留空：自动探测
#   2. 明确指定温度文件路径，例如 /sys/class/thermal/thermal_zone0/temp
temp_path=

[test]
# 是否启用测试模式。
# 作用：开启后会额外启动一个独立测试线程，定时发送测试数据到 test/up。
# 不影响：
#   1. 正常系统遥测上传
#   2. 网络信息上传
#   3. 文件 tailer 采集上传
# 配置方法：
#   1. 1 / true：开启独立测试上报
#   2. 0 / false：关闭测试上报
enable=0
# 测试数据发送周期，单位毫秒。
# 作用：控制 test/up 的发送频率。
# 配置方法：
#   1. 写整数毫秒，例如 1000
#   2. 压测时可调小，普通演示可保持默认
interval_ms=1000
# 测试值类型。
# 作用：决定 value 按什么类型解析。
# 配置方法：
#   1. int：整数
#   2. float：浮点数
#   3. bool：布尔值
#   4. string：字符串
#   5. json：JSON 对象/数组/字面量
type=int
# 测试值变化模式。
# 作用：决定每次发送后 value 是否变化。
# 配置方法：
#   1. fixed：固定不变
#   2. inc：按 step 递增
#   3. dec：按 step 递减
pattern=fixed
# 测试值内容。
# 作用：作为测试数据的初始值。
# 配置方法：
#   1. type=int/float 时写数字，例如 0、12.5
#   2. type=bool 时写 1/0 或 true/false
#   3. type=string 时写普通文本
#   4. type=json 时写合法 JSON，例如 {"temp":26}
value=0
# 测试步进值。
# 作用：pattern=inc/dec 时每次变化的步长。
# 配置方法：
#   1. 写整数，例如 1
#   2. 写浮点数，例如 0.5
step=1
