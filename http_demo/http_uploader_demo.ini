# HTTP uploader demo 配置模板
# 启动方式：
#   ./http_uploader_demo --config ./http_uploader_demo.ini
#
# 说明：
# 1. 配置文件先加载，命令行再次传入同名参数时，以命令行为准。
# 2. 布尔值支持多种写法：1/0、true/false、yes/no、on/off。
# 3. 路径参数一般支持两种配置方法：相对路径 或 绝对路径。
# 4. 留空一般表示不启用、不指定或走默认逻辑。

[http]
# 数据目录。
# 作用：扫描该目录中的待上传文件。
# 配置方法：
#   1. 相对路径，例如 ./data
#   2. 绝对路径，例如 /userdata/modbus_data
dir=./data
# HTTP 接收地址。
# 作用：把 JSON 数据上传到这个接口。
# 配置方法：
#   1. http://IP:端口/路径
#   2. https://域名/路径
url=http://47.100.112.208:8080/ingest
# 设备 ID。
# 作用：上传数据中作为 device_id 字段使用。
# 配置方法：
#   1. 固定业务编号
#   2. 用设备序列号或网关编号
device_id=http_uploader
# 目录扫描周期，单位秒。
# 作用：控制上传程序每隔多久检查一次新文件。
# 配置方法：
#   1. 写整数秒，例如 5
#   2. 实时性要求高可调小，低频上传可调大
interval_s=5
# 单次 HTTP 请求超时时间，单位毫秒。
# 作用：限制请求等待时间，避免长时间卡住。
# 配置方法：
#   1. 写整数毫秒，例如 5000
#   2. 网络较差时可适当调大
http_timeout_ms=5000
# 上传失败重试次数。
# 作用：同一个文件或测试数据一次上传失败后，再尝试几次。
# 配置方法：
#   1. 0：失败后不重试
#   2. 大于 0 的整数：按次数重试
http_retries=3
# 重试初始退避时间，单位毫秒。
# 作用：两次重试之间先等待一段时间，并可能逐步放大。
# 配置方法：
#   1. 0：不等待直接重试
#   2. 写整数毫秒，例如 500
http_backoff_ms=500
# 单文件大小上限，单位 KB。
# 作用：超过此大小的文件会被视为异常文件，不上传。
# 配置方法：
#   1. 写整数 KB，例如 10240
#   2. 按业务单条/单批数据量估算设置
max_file_kb=10240
# 数据目录总大小上限，单位 KB。
# 作用：用于控制目录内累计待处理文件总量。
# 配置方法：
#   1. 写整数 KB，例如 4096
#   2. 建议大于或等于 max_file_kb
max_total_kb=4096
# 文件稳定时间，单位秒。
# 作用：文件最后修改后等待这么久，才认为写入完成、允许上传。
# 配置方法：
#   1. 0：不等待，发现就处理
#   2. 正整数秒，例如 3
stable_age_s=3
# 异常文件目录。
# 作用：解析失败、超限或永久失败的文件可移动到这里。
# 配置方法：
#   1. 相对路径，例如 ./data/bad_data
#   2. 绝对路径，例如 /userdata/upload_bad
bad_dir=./data/bad_data
# 日志文件路径。
# 作用：把运行日志写入该文件，便于问题排查。
# 配置方法：
#   1. 相对路径，例如 ./data/http_uploader.log
#   2. 绝对路径，例如 /userdata/log/http_uploader.log
# 日志文件路径。作用：保存 HTTP demo 运行日志。推荐统一放到 /var/log，便于现场排查。
# 配置方法：
#   1. 绝对路径，例如 /var/log/http_uploader_demo.log
#   2. 相对路径，例如 ./logs/http_uploader_demo.log
log=/var/log/http_uploader_demo.log
# 已发送状态文件路径。作用：记录已经成功上传过的 JSON 文件名，程序被杀死后重新启动时会先读取这个文件，避免重复上传。
# 配置方法：
#   1. 绝对路径，例如 /var/log/http_uploader_demo.sent
#   2. 相对路径，例如 ./state/http_uploader_demo.sent
# 兼容说明：升级后会自动兼容旧版放在数据目录里的 .sent_files 记录。
state_file=/var/log/http_uploader_demo.sent
# 是否跳过 HTTPS 证书校验。
# 作用：适用于测试环境、自签名证书环境。
# 配置方法：
#   1. 0 / false：校验证书，生产推荐
#   2. 1 / true：跳过校验，仅建议测试
http_insecure=0
# 是否开启测试模式。
# 作用：开启后不依赖目录文件，直接定时生成测试数据并上传。
# 配置方法：
#   1. 0 / false：正常目录上传模式
#   2. 1 / true：测试数据上传模式
test_mode=0

[test]
# 是否启用测试区块。
# 作用：与上面的 test_mode 含义一致，通常两处保持一致更直观。
# 配置方法：
#   1. 0 / false：关闭
#   2. 1 / true：开启
enable=0
# 测试数据发送周期，单位秒。
# 作用：test_mode=1 时控制发送频率。
# 配置方法：
#   1. 写整数秒，例如 1
#   2. 压测可调小，演示可保持默认
interval_s=1
# 测试值类型。
# 作用：决定 value 的解析类型。
# 配置方法：
#   1. int：整数
#   2. float：浮点数
#   3. bool：布尔值
#   4. string：字符串
#   5. json：JSON 文本
type=int
# 测试值变化模式。
# 作用：控制每次发送后 value 是否递增/递减。
# 配置方法：
#   1. fixed：固定值
#   2. inc：递增
#   3. dec：递减
pattern=fixed
# 测试值内容。
# 作用：生成上传 payload 时作为 data 字段。
# 配置方法：
#   1. int/float：数字
#   2. bool：1/0、true/false
#   3. string：普通文本
#   4. json：合法 JSON，例如 {"temp":25}
value=0
# 测试步进值。
# 作用：pattern=inc/dec 时每次变化多少。
# 配置方法：
#   1. 整数，例如 1
#   2. 浮点数，例如 0.2
step=1
