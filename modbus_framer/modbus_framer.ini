# Modbus framer 配置模板
# 启动方式：
#   ./modbus_framer --config ./modbus_framer.ini
#
# 说明：
# 1. 配置文件先加载，命令行如果再传同名串口参数，会覆盖这里的值。
# 2. 布尔值支持多种写法：1/0、true/false、yes/no、on/off。
# 3. 路径参数一般支持两种配置方法：相对路径 或 绝对路径。
# 4. 该配置文件可以直接决定执行哪个命令，由 [command].name 指定。
# 5. 未被当前命令使用的区块可以保留，不会报错。

[serial]
# 串口设备路径。
# 作用：指定 Modbus RTU 通讯串口。
# 配置方法：
#   1. Linux 设备路径，例如 /dev/ttyS1、/dev/ttyUSB0
#   2. 如果做命令行覆盖，也可继续用 -d DEV
dev=/dev/ttyS1
# 波特率。
# 作用：串口通讯速率，必须与从站一致。
# 配置方法：
#   1. 常见值：9600、19200、38400、57600、115200
#   2. 如果命令行覆盖，也可继续用 -b BAUD
baud=115200
# 校验位。
# 作用：串口帧校验方式，必须与设备一致。
# 配置方法：
#   1. N：无校验
#   2. E：偶校验
#   3. O：奇校验
parity=E
# 数据位。
# 作用：串口单字节有效位数。
# 配置方法：
#   1. 7
#   2. 8
data_bits=8
# 停止位。
# 作用：串口一帧结束后的停止位个数。
# 配置方法：
#   1. 1
#   2. 2
stop_bits=1
# 是否启用 RS485 模式。
# 作用：某些硬件或驱动需要明确打开 RS485。
# 配置方法：
#   1. 0 / false：关闭
#   2. 1 / true：开启
rs485=0
# 是否输出调试日志。
# 作用：排查 Modbus 通讯问题时更容易定位。
# 配置方法：
#   1. 0 / false：普通日志
#   2. 1 / true：更多调试信息
debug=0
# 从站地址。
# 作用：默认对哪个 Modbus Slave 发命令。
# 配置方法：
#   1. 1~247 的整数
#   2. 命令行覆盖时也可继续用 -a SLAVE
slave=1

[command]
# 要执行的命令名称。
# 作用：决定程序启动后跑 collect、read_holding、scan 等哪一种功能。
# 配置方法：
#   1. collect：周期采集并写文件
#   2. read_holding：读保持寄存器
#   3. read_input：读输入寄存器
#   4. write_reg：写单个寄存器
#   5. write_regs：写多个寄存器
#   6. read_coils：读线圈
#   7. write_coil：写单个线圈
#   8. write_coils：写多个线圈
#   9. scan：扫描从站地址
#   10. stress：压测
name=collect

[collect]
# 采集周期，单位毫秒。
# 作用：每隔多久读一次温湿度等寄存器并写入文件。
# 配置方法：
#   1. 写整数毫秒，例如 1000
#   2. 实时性要求高可调小
interval_ms=1000
# 采集数据输出目录。
# 作用：采集到的数据会写入这个目录。
# 配置方法：
#   1. 相对路径，例如 ./data
#   2. 绝对路径，例如 /userdata/modbus_data
dir=./data
# 写入文件中的 device_id。
# 作用：生成 JSONL 记录时作为设备标识写入。
# 配置方法：
#   1. 固定设备编号
#   2. 网关编号/站点编号
device_id=modbus_framer
# 控制文件路径。
# 作用：运行时可从这个 JSON 文件动态覆盖 interval_ms、records_per_file 等参数。
# 配置方法：
#   1. 相对路径
#   2. 绝对路径，例如 /tmp/modbus_framer_ctrl.json
ctrl_file=/tmp/modbus_framer_ctrl.json
# 单个数据文件大小上限，单位 KB。
# 作用：达到这个大小后会自动滚动生成新文件。
# 配置方法：
#   1. 写整数 KB，例如 200
#   2. 根据单条数据长度和保存周期估算
file_kb=200
# 数据目录总容量上限，单位 KB。
# 作用：用于监控目录累计数据量，建议大于 file_kb。
# 配置方法：
#   1. 写整数 KB，例如 1024
#   2. 按设备离线缓存能力设置
total_kb=1024
# 单文件最大记录数。
# 作用：即使文件没到大小上限，也可以按记录条数滚动。
# 配置方法：
#   1. 写正整数，例如 20
#   2. 数据分析按批次处理时可适当调小
records_per_file=20
# 读取寄存器功能码。
# 作用：决定采集时读保持寄存器还是输入寄存器。
# 配置方法：
#   1. 3：读保持寄存器
#   2. 4：读输入寄存器
func=3
# 温度寄存器地址。
# 作用：采集温度原始值所在地址。
# 配置方法：
#   1. 写 0~65535 的寄存器地址
#   2. 按设备协议文档填写
temp_addr=0
# 湿度寄存器地址。
# 作用：采集湿度原始值所在地址。
# 配置方法：
#   1. 写 0~65535 的寄存器地址
#   2. 按设备协议文档填写
hum_addr=1
# 设备编号寄存器地址。
# 作用：如果需要把某个寄存器值当作 device 字段写入日志，可在这里配置。
# 配置方法：
#   1. 写寄存器地址，例如 2
#   2. 写 -1：不输出 device 字段
device_addr=1
# 温度是否按有符号数解析。
# 作用：有些传感器温度可能允许负值，需要把寄存器按 int16 解释。
# 配置方法：
#   1. 0 / false：按无符号数解析
#   2. 1 / true：按有符号数解析
temp_signed=0
# 单次 Modbus 请求超时，单位毫秒。
# 作用：限制一次读写等待时间。
# 配置方法：
#   1. 写整数毫秒，例如 1000
#   2. 串口链路慢或设备响应慢时可调大
timeout_ms=1000
# 失败重试次数。
# 作用：一次读写失败后再尝试几次。
# 配置方法：
#   1. 0：不重试
#   2. 大于 0 的整数：按次数重试
retries=2

# 当 [command].name=read_holding 时使用本区块。
[read_holding]
# 起始保持寄存器地址。
# 作用：从这个地址开始读取。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按设备协议地址填写
addr=0
# 读取数量。
# 作用：连续读取多少个保持寄存器。
# 配置方法：
#   1. 写 1~125 的整数
#   2. 按实际寄存器长度填写
qty=2

# 当 [command].name=read_input 时使用本区块。
[read_input]
# 起始输入寄存器地址。
# 作用：从这个地址开始读取输入寄存器。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 读取数量。
# 作用：连续读取多少个输入寄存器。
# 配置方法：
#   1. 写 1~125 的整数
#   2. 按设备文档填写
qty=2

# 当 [command].name=write_reg 时使用本区块。
[write_reg]
# 目标寄存器地址。
# 作用：把 value 写到这个保持寄存器。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 要写入的值。
# 作用：写单个保持寄存器时的值。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 如果设备协议有比例缩放，需要先自行换算
value=1

# 当 [command].name=write_regs 时使用本区块。
[write_regs]
# 起始寄存器地址。
# 作用：从这个地址开始连续写多个寄存器。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 多个寄存器的写入值列表。
# 作用：按顺序写入多个寄存器。
# 配置方法：
#   1. 逗号分隔，例如 1,2,3
#   2. 支持十进制或 0x 前缀十六进制，例如 0x10,0x20
values=1,2,3

# 当 [command].name=read_coils 时使用本区块。
[read_coils]
# 起始线圈地址。
# 作用：从这个地址开始读取线圈状态。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 读取线圈个数。
# 作用：连续读取多少个位。
# 配置方法：
#   1. 写 1~2000 的整数
#   2. 按实际需求填写
qty=8

# 当 [command].name=write_coil 时使用本区块。
[write_coil]
# 目标线圈地址。
# 作用：对某个开关位执行开或关。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 线圈目标值。
# 作用：控制该线圈开或关。
# 配置方法：
#   1. 1 / true：写开
#   2. 0 / false：写关
value=1

# 当 [command].name=write_coils 时使用本区块。
[write_coils]
# 起始线圈地址。
# 作用：从这个地址开始批量写线圈。
# 配置方法：
#   1. 写 0~65535 的整数
#   2. 按协议填写
addr=0
# 要写的线圈总位数。
# 作用：告诉程序这批 packed bytes 中一共包含多少个位。
# 配置方法：
#   1. 写 1~1968 的整数
#   2. 必须与 bytes 中的字节数匹配
n_bits=16
# 打包后的线圈字节列表。
# 作用：按 LSB-first 方式批量写多个线圈。
# 配置方法：
#   1. 逗号分隔字节值，例如 1,0
#   2. 可写十六进制，例如 0x01,0x00
#   3. 字节数应等于 ceil(n_bits/8)
bytes=0x01,0x00

# 当 [command].name=scan 时使用本区块。
[scan]
# 扫描起始地址。
# 作用：从这个从站地址开始扫描。
# 配置方法：
#   1. 写 1~247 的整数
#   2. 一般默认从 1 开始
start=1
# 扫描结束地址。
# 作用：扫描到这个从站地址为止。
# 配置方法：
#   1. 写 1~247 的整数
#   2. 必须大于或等于 start
end=247
# 扫描超时，单位毫秒。
# 作用：每个地址等待应答的时间。
# 配置方法：
#   1. 写整数毫秒，例如 50
#   2. 设备响应慢时可适当调大
timeout_ms=50

# 当 [command].name=stress 时使用本区块。
[stress]
# 压测总时长，单位秒。
# 作用：控制压测跑多久。
# 配置方法：
#   1. 0：一直运行
#   2. 大于 0 的整数：运行指定秒数
duration_s=0
# 每轮压测间隔，单位毫秒。
# 作用：控制读写压力大小。
# 配置方法：
#   1. 0：无等待，持续压测
#   2. 正整数毫秒：每轮等待一段时间
interval_ms=20
# 随机种子。
# 作用：用于生成压测随机数据。
# 配置方法：
#   1. 0：程序运行时自动生成
#   2. 固定整数：方便复现实验
seed=0
# 统计输出周期，单位秒。
# 作用：每隔多久打印一次压测统计结果。
# 配置方法：
#   1. 写正整数秒，例如 5
#   2. 调小便于实时观察，调大减少日志
report_s=5
